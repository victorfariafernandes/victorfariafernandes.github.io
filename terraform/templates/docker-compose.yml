services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
      - /opt/llm/Modelfile:/Modelfile:ro
    restart: unless-stopped

  nginx:
    build:
      context: /opt/llm/nginx
      dockerfile: Dockerfile
    container_name: nginx
    ports:
      - "80:80"
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
